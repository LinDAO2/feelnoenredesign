<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noén — Redesign</title>
  <style>
    :root { --noir: #14110f; --cream: #f3ede4; --blue: #2c3a63; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--noir);
      color: var(--cream);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: 0.04em;
    }
    .wrap { text-align: center; }
    h1 { font-size: clamp(3rem, 12vw, 7rem); font-weight: 400; }
    p { margin-top: 1rem; font-size: 0.9rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.3em; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Noén</h1>
    <p>Redesign · Coming Soon</p>
  </div>
</body>
</html>
